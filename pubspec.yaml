name: weather_forecast_pk
description: A professional weather forecast app for Pakistan cities built with Flutter and OpenWeatherMap API.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.4.0
  cupertino_icons: ^1.0.8
  intl: ^0.19.0
  pretty_dio_logger: ^1.4.0
  logger: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - images/
    - assets/
